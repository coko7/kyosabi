{% extends "base.html" %}

{% block title %}Upload — Watari{% endblock %}

{% block content %}
<h1>Upload a file</h1>
<form id="upload-form"
      hx-post="/api/upload"
      hx-encoding="multipart/form-data"
      hx-target="#result"
      hx-swap="innerHTML">
  <div class="field">
    <label for="file">File</label>
    <label id="dropzone" for="file" class="dropzone">
      <input type="file" id="file" name="file" required>
      <span class="dropzone-text">Drop a file here, or click to browse</span>
      <span class="dropzone-file" id="dropzone-file" hidden></span>
    </label>
  </div>

  <div class="field">
    <label for="filename">Custom filename (optional)</label>
    <input type="text" id="filename" name="filename" placeholder="leave blank to keep original name">
  </div>

  {% include "partials/upload_options.html" %}

  <button type="submit">Upload</button>
</form>
<div id="result"></div>
{% endblock %}
